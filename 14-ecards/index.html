<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电子贺卡系列 | Digital E-Cards</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;600&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0a0a0a;
  font-family: 'Inter', sans-serif;
  color: #fff;
  min-height: 100vh;
}

.header {
  text-align: center;
  padding: 60px 20px 40px;
}

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  margin-bottom: 8px;
}

.header p {
  color: rgba(255,255,255,0.4);
  font-size: 14px;
  letter-spacing: 1px;
}

/* Main layout */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 0;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

/* Cards display */
.cards-area {
  padding-right: 32px;
}

.cards-scroll {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}

.ecard {
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}

.ecard:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
}

.ecard canvas {
  display: block;
  width: 100%;
  height: auto;
}

.ecard-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s;
}

.ecard:hover .ecard-overlay { opacity: 1; }

.ecard-overlay span {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 12px;
  color: #fff;
  letter-spacing: 0.5px;
}

/* Preview panel */
.preview-panel {
  position: sticky;
  top: 20px;
  height: fit-content;
}

.preview-card {
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  margin-bottom: 16px;
}

.preview-card canvas {
  display: block;
  width: 100%;
}

/* Customize section */
.customize-panel {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 20px;
}

.customize-title {
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 16px;
}

.c-field {
  margin-bottom: 14px;
}

.c-field label {
  display: block;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 5px;
  letter-spacing: 0.5px;
}

.c-field input, .c-field textarea, .c-field select {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  padding: 8px 10px;
  color: #fff;
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}

.c-field textarea {
  resize: none;
  height: 60px;
  line-height: 1.5;
}

.c-field input:focus, .c-field textarea:focus, .c-field select:focus {
  border-color: rgba(200,150,60,0.5);
}

.theme-row {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
}

.theme-dot {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
  flex-shrink: 0;
}

.theme-dot.active {
  border-color: #fff;
  transform: scale(1.2);
}

.download-row {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}

.dl-btn {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  font-weight: 500;
  transition: all 0.2s;
  text-align: center;
}

.dl-btn-primary {
  background: linear-gradient(135deg, #c8963c, #e8c88e);
  color: #000;
}

.dl-btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(200,150,60,0.3);
}

.dl-btn-secondary {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.6);
}

.dl-btn-secondary:hover {
  background: rgba(255,255,255,0.12);
  color: #fff;
}

/* Share options */
.share-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.share-btn {
  flex: 1;
  padding: 8px 4px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  font-family: inherit;
  transition: all 0.2s;
  text-align: center;
}

.share-btn:hover {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.8);
}

@media(max-width: 900px) {
  .main-layout { grid-template-columns: 1fr; }
  .preview-panel { position: static; margin-bottom: 40px; }
  .preview-card { max-width: 400px; margin: 0 auto 16px; }
  .customize-panel { max-width: 400px; margin: 0 auto; }
}
</style>
</head>
<body>

<div class="header">
  <h1>电子贺卡系列</h1>
  <p>精选主题贺卡 · 发送给你的朋友 · 基于 Dan Koe 的智慧</p>
</div>

<div class="main-layout">
  <!-- Cards grid -->
  <div class="cards-area">
    <div class="cards-scroll" id="cards-scroll"></div>
  </div>

  <!-- Preview & customize -->
  <div class="preview-panel">
    <div class="preview-card">
      <canvas id="preview-canvas" width="600" height="800"></canvas>
    </div>

    <div class="customize-panel">
      <div class="customize-title">定制贺卡</div>

      <div class="theme-row" id="theme-row"></div>

      <div class="c-field">
        <label>收件人</label>
        <input id="c-to" placeholder="送给："/>
      </div>

      <div class="c-field">
        <label>寄件人</label>
        <input id="c-from" placeholder="来自："/>
      </div>

      <div class="c-field">
        <label>祝福语（选填）</label>
        <textarea id="c-message" placeholder="添加你的祝福……"></textarea>
      </div>

      <div class="c-field">
        <label>卡片类型</label>
        <select id="c-type">
          <option value="motivation">激励卡 · 勇敢改变</option>
          <option value="identity">身份卡 · 认识自我</option>
          <option value="wisdom">智慧卡 · 每日反思</option>
          <option value="game">游戏卡 · 快乐成长</option>
          <option value="journey">旅程卡 · 一起前行</option>
        </select>
      </div>

      <div class="download-row">
        <button class="dl-btn dl-btn-primary" onclick="downloadECard()">⬇ 下载 PNG</button>
        <button class="dl-btn dl-btn-secondary" onclick="resetCard()">↺ 重置</button>
      </div>

      <div class="share-row">
        <button class="share-btn" onclick="shareCard('wechat')">💬 微信</button>
        <button class="share-btn" onclick="shareCard('weibo')">🌐 微博</button>
        <button class="share-btn" onclick="shareCard('copy')">📋 复制</button>
        <button class="share-btn" onclick="shareCard('print')">🖨️ 打印</button>
      </div>
    </div>
  </div>
</div>

<script>
const THEMES = [
  { name:'温暖', bg1:'#1a0f05', bg2:'#3a1f0a', bg3:'#2a1000', accent:'#f0c04a', accent2:'#ffd97a', text:'#fff8e8' },
  { name:'宁静', bg1:'#0a1a1a', bg2:'#0f2a2a', bg3:'#0a2020', accent:'#4af0ff', accent2:'#7af0ff', text:'#d0f8ff' },
  { name:'力量', bg1:'#1a0808', bg2:'#2a1010', bg3:'#200808', accent:'#ff6b6b', accent2:'#ff9a9a', text:'#ffd8d8' },
  { name:'智慧', bg1:'#0f0c29', bg2:'#1a1a3a', bg3:'#12102e', accent:'#9090ff', accent2:'#b0b0ff', text:'#e8e8ff' },
  { name:'希望', bg1:'#0d1f0d', bg2:'#1a3a1a', bg3:'#0d2810', accent:'#4aff9e', accent2:'#7affb8', text:'#d0f0d8' },
  { name:'皇家', bg1:'#1a0a2e', bg2:'#2a1050', bg3:'#1a0a30', accent:'#c896e8', accent2:'#e8c8ff', text:'#ece0ff' },
];

const CARD_TYPES = {
  motivation: {
    title: '勇敢改变',
    en: 'Be Bold',
    quote: '改变不是明天的计划，\n是今天的决定。\n\n勇敢踏出第一步，\n你比自己想象的更强大。',
    footer: '✨ 你值得成为你想成为的人 ✨',
    color: '#f0c04a'
  },
  identity: {
    title: '认识自我',
    en: 'Know Yourself',
    quote: '先成为那个人，\n行为自然会跟随。\n\n你不是在改变做什么，\n而是在改变你是谁。',
    footer: '🔍 身份决定行为 🔍',
    color: '#9090ff'
  },
  wisdom: {
    title: '每日反思',
    en: 'Daily Wisdom',
    quote: '每天问自己：\n今天我学到了什么？\n\n明天我要如何\n变得更好？',
    footer: '📚 智慧来自反思 📚',
    color: '#4af0ff'
  },
  game: {
    title: '快乐成长',
    en: 'Play & Grow',
    quote: '把人生当作游戏，\n每个挑战都是升级的机会。\n\n享受过程，\n庆祝每一个小胜利。',
    footer: '🎮 游戏化你的人生 🎮',
    color: '#4aff9e'
  },
  journey: {
    title: '一起前行',
    en: 'Journey Together',
    quote: '改变的路上，\n你并不孤单。\n\n每一步都是进步，\n每一个今天都是新的开始。',
    footer: '🤝 我们一起前行 🤝',
    color: '#c896e8'
  }
};

let currentThemeIdx = 0;
let currentType = 'motivation';
let mainCanvas = null;

function renderThemeDots() {
  const row = document.getElementById('theme-row');
  row.innerHTML = THEMES.map((t, i) => `
    <div class="theme-dot ${i === 0 ? 'active' : ''}"
         style="background:${t.accent}"
         onclick="selectTheme(${i})"
         title="${t.name}"></div>
  `).join('');
}

function selectTheme(idx) {
  currentThemeIdx = idx;
  document.querySelectorAll('.theme-dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });
  renderPreview();
}

function renderPreview() {
  const canvas = document.getElementById('preview-canvas');
  const ctx = canvas.getContext('2d');
  const theme = THEMES[currentThemeIdx];
  const card = CARD_TYPES[currentType];
  const W = canvas.width, H = canvas.height;

  // Background
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, theme.bg1);
  bg.addColorStop(0.5, theme.bg2);
  bg.addColorStop(1, theme.bg3);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const hexToRgb = (hex) => {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
  };

  const addOrb = (x, y, r, color, alpha) => {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, `rgba(${hexToRgb(color)},${alpha})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();
  };

  addOrb(W*0.5, H*0.35, H*0.5, theme.accent, 0.06);
  addOrb(W*0.1, H*0.8, H*0.3, theme.accent2, 0.04);

  ctx.textAlign = 'center';

  // Card type badge
  ctx.font = `500 ${W * 0.018}px 'Inter', sans-serif`;
  ctx.fillStyle = theme.accent;
  ctx.fillText(card.title, W*0.5, H*0.12);

  // Accent divider
  ctx.strokeStyle = theme.accent;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W*0.3, H*0.15);
  ctx.lineTo(W*0.7, H*0.15);
  ctx.stroke();

  // Ornamental icon
  ctx.font = `${W * 0.12}px serif`;
  ctx.fillStyle = theme.accent;
  ctx.globalAlpha = 0.12;
  ctx.fillText('✦', W*0.5, H*0.35);
  ctx.globalAlpha = 1;

  // Quote
  ctx.font = `600 ${Math.round(W * 0.042)}px 'Noto Serif SC', serif`;
  ctx.fillStyle = theme.text;
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 15;
  wrapText(ctx, card.quote, W*0.5, H*0.45, W*0.8, W*0.042*1.8);
  ctx.shadowBlur = 0;

  // Footer
  ctx.font = `400 ${W * 0.022}px 'Noto Serif SC', serif`;
  ctx.fillStyle = theme.accent;
  ctx.fillText(card.footer, W*0.5, H*0.72);

  // Divider
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(W*0.2, H*0.77);
  ctx.lineTo(W*0.8, H*0.77);
  ctx.stroke();

  // To/From
  const to = document.getElementById('c-to').value || '亲爱的朋友';
  const from = document.getElementById('c-from').value || '你的朋友';

  ctx.font = `300 ${W * 0.016}px 'Noto Serif SC', serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillText(`送给：${to}`, W*0.5, H*0.82);
  ctx.fillText(`来自：${from}`, W*0.5, H*0.86);

  // Personal message
  const msg = document.getElementById('c-message').value;
  if (msg && msg.trim()) {
    ctx.font = `400 ${W * 0.019}px 'Noto Serif SC', serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    wrapText(ctx, '"' + msg.trim() + '"', W*0.5, H*0.92, W*0.75, W*0.019*1.7);
  } else {
    ctx.font = `300 ${W * 0.011}px 'Inter', sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillText('How to Fix Your Entire Life in 1 Day · Dan Koe', W*0.5, H*0.94);
  }

  mainCanvas = canvas;
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const lines = text.split('\n');
  for (const line of lines) {
    ctx.fillText(line, x, y);
    y += lineHeight;
  }
}

function downloadECard() {
  if (!mainCanvas) return;
  const link = document.createElement('a');
  const typeName = document.getElementById('c-type').value;
  link.download = `ecard-${typeName}-${Date.now()}.png`;
  link.href = mainCanvas.toDataURL('image/png');
  link.click();
}

function resetCard() {
  document.getElementById('c-to').value = '';
  document.getElementById('c-from').value = '';
  document.getElementById('c-message').value = '';
  renderPreview();
}

function shareCard(method) {
  if (method === 'copy') {
    if (!mainCanvas) return;
    mainCanvas.toBlob(blob => {
      try {
        navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob })
        ]);
        alert('贺卡已复制到剪贴板！');
      } catch(e) {
        alert('复制失败，请尝试下载后手动分享');
      }
    });
  } else if (method === 'print') {
    if (!mainCanvas) return;
    const win = window.open('');
    win.document.write(`<img src="${mainCanvas.toDataURL()}" style="width:100%"/>`);
    win.document.close();
    win.focus();
    win.print();
  } else {
    alert(`分享功能需要将图片保存后再手动分享到 ${method === 'wechat' ? '微信' : '微博'}`);
  }
}

// Render card type selection
function renderCardTypes() {
  const grid = document.getElementById('cards-scroll');
  const types = Object.entries(CARD_TYPES);

  grid.innerHTML = types.map(([key, card], i) => {
    const cardEl = document.createElement('div');
    cardEl.className = 'ecard';

    const cvs = document.createElement('canvas');
    cvs.width = 600; cvs.height = 800;
    cardEl.appendChild(cvs);

    const overlay = document.createElement('div');
    overlay.className = 'ecard-overlay';
    overlay.innerHTML = '<span>预览 & 定制 →</span>';
    cardEl.appendChild(overlay);

    grid.appendChild(cardEl);

    // Draw
    setTimeout(() => drawECard(cvs, card, THEMES[0]), i * 100);

    cardEl.addEventListener('click', () => {
      document.getElementById('c-type').value = key;
      currentType = key;
      renderPreview();
      document.querySelector('.preview-panel').scrollIntoView({behavior:'smooth'});
    });
  });
}

function drawECard(canvas, card, theme) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, theme.bg1);
  bg.addColorStop(0.5, theme.bg2);
  bg.addColorStop(1, theme.bg3);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const hexToRgb = (hex) => {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
  };

  const addOrb = (x, y, r, color, alpha) => {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, `rgba(${hexToRgb(color)},${alpha})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();
  };

  addOrb(W*0.5, H*0.35, H*0.5, theme.accent, 0.06);
  addOrb(W*0.1, H*0.8, H*0.3, theme.accent2, 0.04);

  ctx.textAlign = 'center';

  ctx.font = `500 ${W * 0.018}px 'Inter', sans-serif`;
  ctx.fillStyle = theme.accent;
  ctx.fillText(card.title, W*0.5, H*0.12);

  ctx.strokeStyle = theme.accent;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W*0.3, H*0.15);
  ctx.lineTo(W*0.7, H*0.15);
  ctx.stroke();

  ctx.font = `${W * 0.14}px serif`;
  ctx.fillStyle = theme.accent;
  ctx.globalAlpha = 0.1;
  ctx.fillText('✦', W*0.5, H*0.38);
  ctx.globalAlpha = 1;

  ctx.font = `600 ${Math.round(W * 0.042)}px 'Noto Serif SC', serif`;
  ctx.fillStyle = theme.text;
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 15;
  wrapText(ctx, card.quote, W*0.5, H*0.45, W*0.8, W*0.042*1.8);
  ctx.shadowBlur = 0;

  ctx.font = `400 ${W * 0.022}px 'Noto Serif SC', serif`;
  ctx.fillStyle = theme.accent;
  ctx.fillText(card.footer, W*0.5, H*0.72);

  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(W*0.2, H*0.77);
  ctx.lineTo(W*0.8, H*0.77);
  ctx.stroke();

  ctx.font = `300 ${W * 0.011}px 'Inter', sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillText('How to Fix Your Entire Life in 1 Day · Dan Koe', W*0.5, H*0.94);
}

// Init
document.getElementById('c-type').addEventListener('change', e => {
  currentType = e.target.value;
  renderPreview();
});

['c-to','c-from','c-message'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderPreview);
});

renderThemeDots();
renderCardTypes();
renderPreview();
</script>

</body>
</html>
