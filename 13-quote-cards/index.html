<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金句图片系列 | Dan Koe Quote Cards</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;600&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;1,400;1,600&display=swap');

:root {
  --text: #ffffff;
  --muted: rgba(255,255,255,0.5);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0a0a0a;
  font-family: 'Inter', sans-serif;
  padding: 60px 20px 80px;
}

.header {
  text-align: center;
  margin-bottom: 60px;
}

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  color: #fff;
  margin-bottom: 8px;
}

.header p {
  color: rgba(255,255,255,0.4);
  font-size: 14px;
  letter-spacing: 2px;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.card {
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  transition: transform 0.3s;
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
}

.card canvas {
  display: block;
  width: 100%;
  height: auto;
}

.card-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  padding: 0 4px;
}

.card-num {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 1px;
}

.download-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.6);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.download-btn:hover {
  background: rgba(255,255,255,0.15);
  color: #fff;
}

.footer-note {
  text-align: center;
  margin-top: 60px;
  color: rgba(255,255,255,0.3);
  font-size: 13px;
}

.footer-note a {
  color: #c8963c;
  text-decoration: none;
}

@media(max-width: 500px) {
  .cards-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>7张金句图片</h1>
  <p>基于 Dan Koe《如何在1天内改变你的人生》 · 可自由下载分享</p>
</div>

<div class="cards-grid" id="cards-grid"></div>

<div class="footer-note">
  <p>✨ 基于 Dan Koe 原著设计 · 欢迎分享</p>
</div>

<script>
const QUOTES = [
  {
    num: 1,
    quote: "You don't change what you do, you change who you are.",
    zh: "你改变的不是你在做什么，\n而是你究竟是谁。",
    author: "Dan Koe",
    theme: { bg1:'#0f0c29', bg2:'#302b63', bg3:'#24243e', accent:'#c8963c', accent2:'#e8c88e', text:'#e8e4f0' },
    style: 'dramatic',
    accentText: 'TRANSFORM'
  },
  {
    num: 2,
    quote: "Most people want to change their behavior, but forget that behavior is downstream of identity.",
    zh: "大多数人都想改变自己的行为，\n却忘了行为是身份的下游。",
    author: "Dan Koe",
    theme: { bg1:'#0a1a1a', bg2:'#0f2a2a', bg3:'#0a2020', accent:'#4af0ff', accent2:'#7af0ff', text:'#d0f8ff' },
    style: 'minimal',
    accentText: 'IDENTITY'
  },
  {
    num: 3,
    quote: "Agency × Opportunity × Wisdom = Success. Most people focus on the first two. Wisdom is the multiplier.",
    zh: "能动性 × 机会 × 智慧 = 成功。\n大多数人都忽略了第三个——智慧。",
    author: "Dan Koe",
    theme: { bg1:'#1a1a0a', bg2:'#2a2a0f', bg3:'#1a1a05', accent:'#f0c04a', accent2:'#ffd97a', text:'#fff8d0' },
    style: 'formula',
    accentText: 'FORMULA'
  },
  {
    num: 4,
    quote: "The greatest obstacle isn't lacking ability — it's unconscious identity-defense reactions.",
    zh: "最大的障碍不是能力的缺乏，\n而是无意识的身份防御反应。",
    author: "Dan Koe",
    theme: { bg1:'#1a0a0a', bg2:'#2a1010', bg3:'#200808', accent:'#ff6b6b', accent2:'#ff9a9a', text:'#ffd8d8' },
    style: 'bold',
    accentText: 'FEAR'
  },
  {
    num: 5,
    quote: "Gamify your life. Make growth a game you want to keep playing.",
    zh: "把人生游戏化。\n让成长变成你舍不得停下的游戏。",
    author: "Dan Koe",
    theme: { bg1:'#0a1a2a', bg2:'#0f2a4a', bg3:'#0a1a30', accent:'#4a9eff', accent2:'#7ab3ff', text:'#d0e8ff' },
    style: 'playful',
    accentText: 'PLAY'
  },
  {
    num: 6,
    quote: "Awareness itself is change. When you notice you're repeating an old pattern, that pattern starts to lose power.",
    zh: "觉察本身就是改变。\n当你注意到自己在重复旧模式，\n那个模式已经开始失去力量。",
    author: "Dan Koe",
    theme: { bg1:'#1a0a2e', bg2:'#2a1050', bg3:'#1a0a30', accent:'#c896e8', accent2:'#e8c8ff', text:'#ece0ff' },
    style: 'zen',
    accentText: 'AWARE'
  },
  {
    num: 7,
    quote: "The formula for a good life: Know who you are, know what you want, and have the courage to act on both.",
    zh: "美好人生的公式：\n知道你是谁，知道你要什么，\n有勇气去行动。",
    author: "Dan Koe",
    theme: { bg1:'#0d1f0d', bg2:'#1a3a1a', bg3:'#0d2810', accent:'#4aff9e', accent2:'#7affb8', text:'#d0f0d8' },
    style: 'nature',
    accentText: 'LIFE'
  }
];

function drawCard(canvas, quote, width=800, height=800) {
  const ctx = canvas.getContext('2d');
  const { bg1, bg2, bg3, accent, accent2, text } = quote.theme;
  canvas.width = width;
  canvas.height = height;

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, width, height);
  bg.addColorStop(0, bg1);
  bg.addColorStop(0.5, bg2);
  bg.addColorStop(1, bg3);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, width, height);

  // Decorative glow orbs
  const addOrb = (x, y, r, color, alpha) => {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, color.replace(')', ','+alpha+')').replace('rgb', 'rgba').replace('#',''));
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  };

  const hexToRgb = (hex) => {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
  };

  addOrb(width*0.5, height*0.35, height*0.4, `rgb(${hexToRgb(accent)})`, 0.06);
  addOrb(width*0.15, height*0.75, height*0.3, `rgb(${hexToRgb(accent2)})`, 0.04);
  addOrb(width*0.85, height*0.2, height*0.25, `rgb(${hexToRgb(accent)})`, 0.03);

  // Style variations
  const style = quote.style;

  if (style === 'dramatic') {
    // Large background text
    ctx.font = `800 ${width * 0.2}px 'Cormorant Garamond', serif`;
    ctx.fillStyle = accent;
    ctx.globalAlpha = 0.08;
    ctx.textAlign = 'center';
    ctx.fillText(quote.accentText, width*0.5, height*0.35);
    ctx.globalAlpha = 1;

    // Quote marks
    ctx.font = `400 ${width * 0.2}px 'Playfair Display', serif`;
    ctx.fillStyle = accent;
    ctx.globalAlpha = 0.2;
    ctx.fillText('"', width*0.1, height*0.3);
    ctx.globalAlpha = 1;

    // Main quote
    ctx.font = `700 ${Math.round(width * 0.038)}px 'Noto Serif SC', 'Playfair Display', serif`;
    ctx.fillStyle = text;
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 20;
    wrapText(ctx, quote.quote, width*0.5, height*0.38, width*0.75, width*0.038*1.5);
    ctx.shadowBlur = 0;

    // Divider
    const divY = height * 0.66;
    ctx.strokeStyle = accent;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(width*0.35, divY);
    ctx.lineTo(width*0.65, divY);
    ctx.stroke();

    // Author
    ctx.font = `500 ${width * 0.022}px 'Inter', sans-serif`;
    ctx.fillStyle = accent;
    ctx.fillText('— ' + quote.author, width*0.5, height*0.72);

    // Chinese translation
    ctx.font = `400 ${width * 0.018}px 'Noto Serif SC', serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    wrapText(ctx, quote.zh, width*0.5, height*0.82, width*0.7, width*0.018*1.8);

    // Bottom
    ctx.font = `300 ${width * 0.012}px 'Inter', sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillText('How to Fix Your Entire Life in 1 Day', width*0.5, height*0.94);

  } else if (style === 'minimal') {
    ctx.textAlign = 'center';

    // Accent word
    ctx.font = `700 ${width * 0.08}px 'Inter', sans-serif`;
    ctx.fillStyle = accent;
    ctx.globalAlpha = 0.15;
    ctx.fillText(quote.accentText, width*0.5, height*0.3);
    ctx.globalAlpha = 1;

    // Accent bar
    ctx.fillStyle = accent;
    ctx.fillRect(width*0.45, height*0.32, width*0.1, 2);

    // Quote
    ctx.font = `600 ${Math.round(width * 0.036)}px 'Noto Serif SC', serif`;
    ctx.fillStyle = text;
    wrapText(ctx, quote.quote, width*0.5, height*0.45, width*0.78, width*0.036*1.6);

    // Chinese
    ctx.font = `400 ${width * 0.02}px 'Noto Serif SC', serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    wrapText(ctx, quote.zh, width*0.5, height*0.67, width*0.72, width*0.02*1.8);

    // Author
    ctx.font = `400 ${width * 0.016}px 'Inter', sans-serif`;
    ctx.fillStyle = accent;
    ctx.fillText('— ' + quote.author, width*0.5, height*0.8);

    ctx.font = `300 ${width * 0.011}px 'Inter', sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillText('How to Fix Your Entire Life in 1 Day', width*0.5, height*0.93);

  } else if (style === 'formula') {
    ctx.textAlign = 'center';

    // Formula decoration
    const cy = height * 0.25;
    const cx = width * 0.5;

    ctx.beginPath();
    ctx.arc(cx, cy, height*0.06, 0, Math.PI*2);
    ctx.strokeStyle = accent;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.3;
    ctx.stroke();
    ctx.globalAlpha = 1;

    ctx.font = `800 ${width * 0.04}px 'Inter', sans-serif`;
    ctx.fillStyle = accent;
    ctx.fillText(quote.accentText, cx, cy + height*0.012);

    // Quote
    ctx.font = `700 ${Math.round(width * 0.035)}px 'Noto Serif SC', serif`;
    ctx.fillStyle = text;
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 15;
    wrapText(ctx, quote.quote, cx, height*0.4, width*0.78, width*0.035*1.6);
    ctx.shadowBlur = 0;

    // Divider
    ctx.strokeStyle = accent;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(width*0.3, height*0.6);
    ctx.lineTo(width*0.7, height*0.6);
    ctx.stroke();

    // Chinese
    ctx.font = `400 ${width * 0.019}px 'Noto Serif SC', serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    wrapText(ctx, quote.zh, cx, height*0.68, width*0.7, width*0.019*1.9);

    ctx.font = `400 ${width * 0.016}px 'Inter', sans-serif`;
    ctx.fillStyle = accent;
    ctx.fillText('— ' + quote.author, cx, height*0.8);

    ctx.font = `300 ${width * 0.011}px 'Inter', sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillText('How to Fix Your Entire Life in 1 Day', cx, height*0.93);

  } else if (style === 'bold') {
    ctx.textAlign = 'center';

    // Large accent
    ctx.font = `800 ${width * 0.25}px 'Cormorant Garamond', serif`;
    ctx.fillStyle = accent;
    ctx.globalAlpha = 0.07;
    ctx.fillText(quote.accentText, width*0.5, height*0.4);
    ctx.globalAlpha = 1;

    // Quote
    ctx.font = `700 ${Math.round(width * 0.04)}px 'Noto Serif SC', serif`;
    ctx.fillStyle = text;
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 25;
    wrapText(ctx, quote.quote, width*0.5, height*0.4, width*0.78, width*0.04*1.5);
    ctx.shadowBlur = 0;

    // Accent bar
    ctx.fillStyle = accent;
    ctx.fillRect(width*0.3, height*0.63, width*0.4, 2);

    // Chinese
    ctx.font = `400 ${width * 0.02}px 'Noto Serif SC', serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    wrapText(ctx, quote.zh, width*0.5, height*0.72, width*0.72, width*0.02*2);

    ctx.font = `500 ${width * 0.016}px 'Inter', sans-serif`;
    ctx.fillStyle = accent;
    ctx.fillText('— ' + quote.author, width*0.5, height*0.85);

    ctx.font = `300 ${width * 0.011}px 'Inter', sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillText('How to Fix Your Entire Life in 1 Day', width*0.5, height*0.94);

  } else if (style === 'playful') {
    ctx.textAlign = 'center';

    // Playful shapes
    ctx.save();
    ctx.translate(width*0.2, height*0.2);
    ctx.rotate(-0.2);
    ctx.fillStyle = accent;
    ctx.globalAlpha = 0.1;
    ctx.fillRect(-30, -30, 60, 60);
    ctx.globalAlpha = 1;
    ctx.restore();

    ctx.save();
    ctx.translate(width*0.8, height*0.7);
    ctx.rotate(0.15);
    ctx.strokeStyle = accent2;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.2;
    ctx.beginPath();
    ctx.arc(0, 0, 40, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();

    // Quote
    ctx.font = `700 ${Math.round(width * 0.038)}px 'Noto Serif SC', serif`;
    ctx.fillStyle = text;
    wrapText(ctx, quote.quote, width*0.5, height*0.4, width*0.78, width*0.038*1.6);

    // Chinese
    ctx.font = `400 ${width * 0.02}px 'Noto Serif SC', serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    wrapText(ctx, quote.zh, width*0.5, height*0.62, width*0.72, width*0.02*1.9);

    // Author
    ctx.font = `600 ${width * 0.018}px 'Inter', sans-serif`;
    ctx.fillStyle = accent;
    ctx.fillText('— ' + quote.author, width*0.5, height*0.76);

    ctx.font = `300 ${width * 0.011}px 'Inter', sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillText('How to Fix Your Entire Life in 1 Day', width*0.5, height*0.93);

  } else if (style === 'zen') {
    ctx.textAlign = 'center';

    // Zen circle
    ctx.beginPath();
    ctx.arc(width*0.5, height*0.28, height*0.05, 0, Math.PI*2);
    ctx.strokeStyle = accent;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.font = `600 ${width * 0.02}px 'Inter', sans-serif`;
    ctx.fillStyle = accent;
    ctx.letterSpacing = '4px';
    ctx.fillText(quote.accentText, width*0.5, height*0.36);

    // Quote
    ctx.font = `400 ${Math.round(width * 0.032)}px 'Noto Serif SC', serif`;
    ctx.fillStyle = text;
    wrapText(ctx, quote.quote, width*0.5, height*0.46, width*0.76, width*0.032*1.7);

    // Thin line
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(width*0.25, height*0.65);
    ctx.lineTo(width*0.75, height*0.65);
    ctx.stroke();

    // Chinese
    ctx.font = `400 ${width * 0.019}px 'Noto Serif SC', serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    wrapText(ctx, quote.zh, width*0.5, height*0.73, width*0.7, width*0.019*1.9);

    ctx.font = `400 ${width * 0.015}px 'Inter', sans-serif`;
    ctx.fillStyle = accent;
    ctx.fillText('— ' + quote.author, width*0.5, height*0.85);

    ctx.font = `300 ${width * 0.01}px 'Inter', sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillText('How to Fix Your Entire Life in 1 Day', width*0.5, height*0.94);

  } else if (style === 'nature') {
    ctx.textAlign = 'center';

    // Leaf-like shapes
    ctx.save();
    ctx.translate(width*0.15, height*0.25);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(20, -30, 50, -20, 60, 0);
    ctx.bezierCurveTo(50, 20, 20, 30, 0, 0);
    ctx.fillStyle = accent;
    ctx.globalAlpha = 0.06;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();

    ctx.font = `600 ${width * 0.024}px 'Inter', sans-serif`;
    ctx.fillStyle = accent;
    ctx.fillText(quote.accentText, width*0.5, height*0.3);

    // Quote
    ctx.font = `400 ${Math.round(width * 0.034)}px 'Noto Serif SC', serif`;
    ctx.fillStyle = text;
    wrapText(ctx, quote.quote, width*0.5, height*0.44, width*0.76, width*0.034*1.6);

    // Chinese
    ctx.font = `400 ${width * 0.02}px 'Noto Serif SC', serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    wrapText(ctx, quote.zh, width*0.5, height*0.64, width*0.72, width*0.02*2);

    ctx.font = `500 ${width * 0.016}px 'Inter', sans-serif`;
    ctx.fillStyle = accent;
    ctx.fillText('— ' + quote.author, width*0.5, height*0.8);

    ctx.font = `300 ${width * 0.01}px 'Inter', sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillText('How to Fix Your Entire Life in 1 Day', width*0.5, height*0.94);
  }
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const chars = text.split('');
  let line = '';
  let testLine = '';
  const avgCharWidth = ctx.measureText('中').width;

  for (let i = 0; i < chars.length; i++) {
    if (chars[i] === '\n') {
      ctx.fillText(line, x, y);
      line = '';
      testLine = '';
      y += lineHeight;
      continue;
    }
    testLine += chars[i];
    const w = ctx.measureText(testLine).width;
    if (w > maxWidth && i > 0) {
      ctx.fillText(line, x, y);
      line = chars[i];
      testLine = chars[i];
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, y);
}

function renderAll() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';

  QUOTES.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'card';

    const canvas = document.createElement('canvas');
    card.appendChild(canvas);

    const info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML = `
      <span class="card-num">第 ${q.num} / 7 张</span>
      <button class="download-btn" onclick="downloadCard(${i}, event)">⬇ 下载 PNG</button>
    `;
    card.appendChild(info);

    grid.appendChild(card);

    // Draw the card
    setTimeout(() => drawCard(canvas, q), i * 50);
  });
}

function downloadCard(i, e) {
  e.stopPropagation();
  const canvas = document.createElement('canvas');
  drawCard(canvas, QUOTES[i], 1080, 1080);
  const link = document.createElement('a');
  link.download = `dan-koe-quote-${i+1}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

renderAll();
</script>
</body>
</html>
